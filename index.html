<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tic Tac Toe</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="icon" type="image/svg+xml" href="tic-tac-toe.svg" />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="game-container">
			<div class="cmd-bar">
				<div class="title">
					<img src="tic-tac-toe.svg" alt="tic-tac-toe.svg" class="cmd-icon" />
					<span>tic_tac_toe.exe</span>
				</div>
				<div class="cmd-controls">
					<button id="minimize">_</button>
					<button id="maximize">□</button>
					<button id="close">×</button>
				</div>
			</div>

			<div class="board"></div>

			<div class="game-info">
				<p class="status"></p>
				<button id="restart-btn">Restart Game</button>
			</div>
		</main>

		<dialog id="game-modal" class="modal">
			<div tabindex="-1" autofocus></div>
			<div id="modal-bar" class="cmd-bar">
				<div class="title">
					<img src="tic-tac-toe.svg" alt="Settings" class="cmd-icon" />
					<span>settings.exe</span>
				</div>
				<div class="cmd-controls">
					<button id="minimize">_</button>
					<button id="maximize">□</button>
					<button id="close">×</button>
				</div>
			</div>

			<div class="modal-content">
				<form id="settings-form">
					<div class="settings-group">
						<div class="button-group">
							<label>
								<input type="radio" name="mode" value="pvp" checked />
								<span>Player vs Player</span>
							</label>
							<label>
								<input type="radio" name="mode" value="pvai" />
								<span>Player vs AI</span>
							</label>
						</div>
					</div>

					<div class="settings-group">
						<div class="button-group">
							<label>
								<input type="radio" name="board-size" value="3" checked />
								<span>3x3</span>
							</label>
							<label>
								<input type="radio" name="board-size" value="4" />
								<span>4x4</span>
							</label>
							<label>
								<input type="radio" name="board-size" value="5" />
								<span>5x5</span>
							</label>
							<label>
								<input type="radio" name="board-size" value="6" />
								<span>6x6</span>
							</label>
						</div>

						<div class="custom-size-group">
							<label for="custom-size">Custom Size: </label>
							<input
								type="number"
								id="custom-size"
								name="custom-size"
								min="7"
								placeholder="min:7"
							/>
						</div>
					</div>

					<div class="modal-actions">
						<button type="submit" id="start-game-btn">Start Game</button>
					</div>
				</form>
			</div>
		</dialog>

		<footer>
			<p>
				<a
					href="https://github.com/karulll"
					target="_blank"
					rel="noopener noreferrer"
					>karulll (github)</a
				>
			</p>
		</footer>
		<script src="script.js"></script>
	</body>
</html>
